<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UPSC AI Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background-color: #09090b; color: #f4f4f5; }
    .glass { background: rgba(24, 24, 27, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5); }
    .tag-gs1 { background: rgba(220,38,38,0.2); color: #fca5a5; border: 1px solid rgba(220,38,38,0.3); }
    .tag-gs2 { background: rgba(37,99,235,0.2); color: #93c5fd; border: 1px solid rgba(37,99,235,0.3); }
    .tag-gs3 { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
    .tag-gs4 { background: rgba(217,119,6,0.2); color: #fcd34d; border: 1px solid rgba(217,119,6,0.3); }
    .tag-default { background: rgba(161,161,170,0.2); color: #d4d4d8; border: 1px solid rgba(161,161,170,0.3); }
    .expand-content { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-in-out; }
    .expand-content.open { max-height: 2000px; }
  </style>
</head>
<body class="min-h-screen flex flex-col">
  <header class="glass sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
        <i data-lucide="book-open" class="text-white w-5 h-5"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold tracking-tight">UPSC AI Dashboard</h1>
        <p class="text-xs text-zinc-400">Real-time Current Affairs Engine</p>
      </div>
    </div>
    <div class="flex items-center gap-4">
      <div class="glass px-4 py-2 rounded-full flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
        <span class="text-sm font-medium" id="article-count">Loading...</span>
      </div>
    </div>
  </header>

  <main class="flex-1 max-w-[95%] w-full mx-auto p-6 flex flex-col md:flex-row gap-8">
    <aside class="md:w-64 flex-shrink-0">
      <div class="glass p-5 rounded-2xl sticky top-24">
        <h2 class="text-sm font-semibold uppercase tracking-wider text-zinc-400 mb-4">Filters</h2>
        <div class="space-y-2" id="filter-container">
          <button class="filter-btn w-full text-left px-4 py-3 rounded-xl bg-zinc-800/50 hover:bg-zinc-800 transition text-sm flex items-center justify-between" data-tag="ALL">
            <span>All Papers</span>
            <i data-lucide="check" class="w-4 h-4 text-indigo-400 hidden check-icon"></i>
          </button>
          <button class="filter-btn w-full text-left px-4 py-3 rounded-xl bg-zinc-800/50 hover:bg-zinc-800 transition text-sm flex items-center justify-between" data-tag="GS1">
            <span>GS Paper 1</span>
            <i data-lucide="check" class="w-4 h-4 text-indigo-400 hidden check-icon"></i>
          </button>
          <button class="filter-btn w-full text-left px-4 py-3 rounded-xl bg-zinc-800/50 hover:bg-zinc-800 transition text-sm flex items-center justify-between" data-tag="GS2">
            <span>GS Paper 2</span>
            <i data-lucide="check" class="w-4 h-4 text-indigo-400 hidden check-icon"></i>
          </button>
          <button class="filter-btn w-full text-left px-4 py-3 rounded-xl bg-zinc-800/50 hover:bg-zinc-800 transition text-sm flex items-center justify-between" data-tag="GS3">
            <span>GS Paper 3</span>
            <i data-lucide="check" class="w-4 h-4 text-indigo-400 hidden check-icon"></i>
          </button>
          <button class="filter-btn w-full text-left px-4 py-3 rounded-xl bg-zinc-800/50 hover:bg-zinc-800 transition text-sm flex items-center justify-between" data-tag="GS4">
            <span>GS Paper 4</span>
            <i data-lucide="check" class="w-4 h-4 text-indigo-400 hidden check-icon"></i>
          </button>
        </div>
      </div>
    </aside>

    <div class="flex-1 space-y-6" id="feed-container">
      <!-- Loading skeletons -->
      <div class="glass p-6 rounded-2xl animate-pulse">
        <div class="h-6 bg-zinc-800 rounded w-3/4 mb-4"></div>
        <div class="h-4 bg-zinc-800 rounded w-1/2 mb-6"></div>
        <div class="h-20 bg-zinc-800 rounded w-full"></div>
      </div>
    </div>
  </main>

  <script src="app.js?v=3"></script>
</body>
</html>

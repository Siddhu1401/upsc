name: Daily UPSC Scraper

on:
  schedule:
    # 4:00 AM IST = 22:30 UTC (previous day)
    - cron: "30 22 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape-and-enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # THIS IS THE CHANGED LINE: Using your PAT instead of default bot token
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run UPSC pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Commit updated news.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --staged --quiet || git commit -m "chore: daily news refresh [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push